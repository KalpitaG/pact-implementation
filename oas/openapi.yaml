openapi: 3.0.3
info:
  title: PactProviderDemo API
  description: |
    Provider service API for the AI-powered contract testing pet project.
    Consumer: ConsumerService (pact-implementation repo)
    Provider: ProviderService (pact-provider-demo repo)
  version: 1.0.0
servers:
  - url: http://localhost:3001

paths:
  # =========================================================================
  # ITEMS
  # =========================================================================
  /items:
    get:
      summary: List all items
      operationId: listItems
      tags: [Items]
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category name
        - name: inStock
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by stock availability (sent as string in query params)
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Item"
                  total:
                    type: integer
    post:
      summary: Create a new item
      operationId: createItem
      tags: [Items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price]
              properties:
                name:
                  type: string
                price:
                  type: number
                category:
                  type: string
                inStock:
                  type: boolean
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/{id}:
    get:
      summary: Get item by ID
      operationId: getItem
      tags: [Items]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Replace an item (full update)
      operationId: replaceItem
      tags: [Items]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price]
              properties:
                name:
                  type: string
                price:
                  type: number
                category:
                  type: string
                inStock:
                  type: boolean
      responses:
        "200":
          description: Item replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Item not found
    patch:
      summary: Partially update an item
      operationId: updateItem
      tags: [Items]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                category:
                  type: string
                inStock:
                  type: boolean
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Item not found
    delete:
      summary: Delete an item
      operationId: deleteItem
      tags: [Items]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Item deleted (no content)
        "404":
          description: Item not found

  /items/search:
    get:
      summary: Search items by query string
      operationId: searchItems
      tags: [Items]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (required — provider returns 400 without it)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [results, query, count]
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Item"
                  query:
                    type: string
                  count:
                    type: integer
        "400":
          description: Missing required query parameter q

  /items/count:
    get:
      summary: Get total item count
      operationId: getItemCount
      tags: [Items]
      responses:
        "200":
          description: Total number of items
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer

  # =========================================================================
  # CATEGORIES
  # =========================================================================
  /categories:
    get:
      summary: List all categories
      operationId: listCategories
      tags: [Categories]
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                required: [categories, total]
                properties:
                  categories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
                  total:
                    type: integer
    post:
      summary: Create a new category
      operationId: createCategory
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      summary: Get category by ID
      operationId: getCategoryById
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found

  /categories/{id}/items:
    get:
      summary: Get items in a category
      operationId: getCategoryItems
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Items in this category
          content:
            application/json:
              schema:
                type: object
                required: [category, items, count]
                properties:
                  category:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Item"
                  count:
                    type: integer
        "404":
          description: Category not found

  # =========================================================================
  # USERS
  # =========================================================================
  /users/{id}:
    get:
      summary: Get user by ID (public info only — no email)
      operationId: getUserById
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public user info (id, username, role — NOT email)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "404":
          description: User not found

  /users/{id}/profile:
    get:
      summary: Get full user profile (includes email)
      operationId: getUserProfile
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full user profile including email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found

components:
  schemas:
    Item:
      type: object
      required: [id, name, price]
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        category:
          type: string
        inStock:
          type: boolean

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string

    UserPublic:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string

    UserProfile:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string

    Error:
      type: object
      properties:
        message:
          type: string