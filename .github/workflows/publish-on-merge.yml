# =============================================================================
# Publish Pact on Merge
# =============================================================================
#
# TWO PUBLISH EVENTS:
#
#   Event 1 — AI PR merged into feature branch:
#     Trigger: push to any branch with contract test changes
#     Action: publish pact tagged with the feature branch name
#     Purpose: enables can-i-deploy checks against feature branch
#
#   Event 2 — Feature branch merged into main:
#     Trigger: push to main with contract test changes
#     Action: publish pact tagged as "main"
#     Purpose: this is the production contract that can-i-deploy uses
#
# WHY NOT publish during test generation:
#   The AI PR hasn't been reviewed yet. Publishing unreviewed contracts
#   would pollute the broker with potentially incorrect expectations.
#   Publish only happens AFTER a human merges.
#
# =============================================================================

name: Publish Pact on Merge

on:
  push:
    branches-ignore:
      - 'contract-tests/**'    # Never publish from AI working branches
    paths:
      - 'tests/contract-tests/**'

jobs:
  publish-pact:
    name: Publish Pact to Pactflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Determine branch context
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          if [ "$BRANCH_NAME" = "main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
            echo "publish_branch=main" >> $GITHUB_OUTPUT
            echo "📌 Publishing to MAIN (production contract)"
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
            echo "publish_branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
            echo "📌 Publishing to feature branch: $BRANCH_NAME"
          fi

      - name: Run contract tests to generate pact files
        run: |
          NODE_OPTIONS='--experimental-vm-modules' npx jest tests/contract-tests/ \
            --testPathPatterns='\.pact\.test\.' \
            --forceExit

      - name: Publish Pact to Pactflow
        env:
          PACTFLOW_BASE_URL: ${{ secrets.PACTFLOW_BASE_URL }}
          PACTFLOW_TOKEN: ${{ secrets.PACTFLOW_TOKEN }}
        run: |
          if [ ! -d "./pacts" ] || [ -z "$(ls -A ./pacts 2>/dev/null)" ]; then
            echo "❌ No pact files found in ./pacts — tests may not have generated output"
            exit 1
          fi

          echo "📦 Pact files found:"
          ls -la ./pacts/

          PUBLISH_BRANCH="${{ steps.branch.outputs.publish_branch }}"
          VERSION="${{ github.sha }}"

          echo "Publishing with version=$VERSION branch=$PUBLISH_BRANCH"

          npx pact-broker publish ./pacts \
            --consumer-app-version="$VERSION" \
            --branch="$PUBLISH_BRANCH" \
            --broker-base-url="$PACTFLOW_BASE_URL" \
            --broker-token="$PACTFLOW_TOKEN"

          echo "✅ Pact published successfully (branch: $PUBLISH_BRANCH)"